<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — SaaS Starter Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{surface:{primary:'#0a0a0f',elevated:'#12121a',glass:'rgba(255,255,255,0.04)'},border:{subtle:'rgba(255,255,255,0.06)',medium:'rgba(255,255,255,0.10)'},accent:{neon:'#6366f1','neon-hover':'#818cf8',cyan:'#22d3ee',emerald:'#10b981',rose:'#f43f5e'},text:{primary:'#f1f5f9',secondary:'#cbd5e1',muted:'#94a3b8',faint:'#64748b'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <link rel="stylesheet" href="assets/css/demo.css">
</head>
<body class="min-h-screen bg-surface-primary flex items-center justify-center p-4 font-sans antialiased">
    <div class="w-full max-w-md demo-fade-in">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 group">
                <img src="assets/img/logo.png" alt="Logo" class="w-10 h-10 rounded-xl object-contain">
                <span class="text-xl font-bold text-text-primary">SaaS Starter</span>
            </a>
        </div>

        <div class="glass-elevated p-8">
            <h2 class="text-2xl font-bold text-text-primary mb-1">Welcome back</h2>
            <p class="text-text-muted text-sm mb-8">Sign in to your account to continue</p>

            <form class="space-y-5" onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1.5">Email address</label>
                    <input type="email" value="admin@example.com" class="w-full px-4 py-3 bg-white/[0.04] border border-white/[0.06] rounded-xl text-text-primary placeholder:text-text-faint focus:outline-none focus:ring-2 focus:ring-accent-neon/50 focus:border-accent-neon/50 transition-all" placeholder="you@company.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1.5">Password</label>
                    <input type="password" value="password" class="w-full px-4 py-3 bg-white/[0.04] border border-white/[0.06] rounded-xl text-text-primary placeholder:text-text-faint focus:outline-none focus:ring-2 focus:ring-accent-neon/50 focus:border-accent-neon/50 transition-all" placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" checked class="w-4 h-4 rounded border-white/10 bg-white/[0.04] text-accent-neon focus:ring-accent-neon/50">
                        <span class="text-sm text-text-muted">Remember me</span>
                    </label>
                </div>
                <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-accent-neon hover:bg-accent-neon-hover text-white font-semibold rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-accent-neon/50 focus:ring-offset-2 focus:ring-offset-surface-primary">Sign In</button>
            </form>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-text-muted">Don't have an account? <a href="register.html" class="text-accent-neon hover:text-accent-neon-hover font-medium transition-colors">Create one</a></p>
        </div>
    </div>
</body>
</html>
